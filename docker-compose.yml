version: '3.9'

services:

  flask-app:
    build: .
    container_name: flask-app

    ports:
      - "5000:5000"

    environment:
      MYSQL_HOST: mysql-db
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin
      MYSQL_DATABASE: myDb

    depends_on:
      - mysql-db

  mysql-db:
    image: mysql:8.0
    container_name: mysql-db

    restart: always

    environment:
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: myDb

    ports:
      - "3306:3306"

    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data:
